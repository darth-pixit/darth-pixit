name: Android Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0-beta1)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Install JS dependencies
        shell: bash
        run: |
          set -o pipefail
          npm ci 2>&1 | tee /tmp/npm-ci.log

      - name: Build release APK
        working-directory: android
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace --console=plain 2>&1 | tee /tmp/gradle.log

      - name: Print failure tail to job summary
        if: failure()
        shell: bash
        run: |
          {
            echo "## Failure tail"
            for f in /tmp/gradle.log /tmp/npm-ci.log; do
              if [ -f "$f" ]; then
                echo ""
                echo "### \`$f\` (last 300 lines)"
                echo '```'
                tail -300 "$f"
                echo '```'
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload full build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /tmp/gradle.log
            /tmp/npm-ci.log
            android/app/build/reports/
            android/app/build/outputs/logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          draft: false
          prerelease: true
